<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Custom Speed</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        margin: 24px;
        color: #1d1d1f;
      }
      h1 {
        font-size: 1.25em;
        margin: 0 0 6px;
      }
      p {
        font-size: 13px;
        color: #555;
        margin: 0 0 18px;
      }
      label {
        display: block;
        margin-bottom: 6px;
        font-size: 13px;
        font-weight: 600;
      }
      input {
        display: block;
        width: 100%;
        padding: 9px 10px;
        font-size: 14px;
        border: 1px solid #ccc;
        border-radius: 8px;
        margin-bottom: 18px;
      }
      button {
        width: 100%;
        padding: 10px;
        font-size: 14px;
        font-weight: 600;
        border: none;
        border-radius: 8px;
        background: #1f6feb;
        color: #fff;
        cursor: pointer;
        transition: background 0.2s ease;
      }
      button:hover {
        background: #1a5fd0;
      }
    </style>
  </head>
  <body>
    <h1>Custom Speed</h1>
    <p>How many seconds each word stays on screen (1–600).</p>
    <label for="seconds">Seconds</label>
    <input type="number" id="seconds" min="1" max="600" step="1" />
    <button id="saveButton">Save</button>
    <script src="src/renderer/speed.js"></script>
  </body>
</html>
