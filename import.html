<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Import Dictionary</title>
    <style>
      /* Obsidian premium — see DESIGN.md */
      :root {
        color-scheme: dark;
        --bg: oklch(0.18 0.012 264);
        --bg-elev: oklch(0.235 0.014 264);
        --surface: oklch(0.235 0.013 264);
        --surface-2: oklch(0.215 0.012 264);
        --heading: oklch(0.965 0.012 90);
        --text: oklch(0.88 0.008 264);
        --muted: oklch(0.64 0.012 264);
        --accent: oklch(0.80 0.085 82);
        --accent-ink: oklch(0.20 0.02 80);
        --border: oklch(1 0 0 / 0.10);
        --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
      }
      * { box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
        margin: 0; padding: 28px;
        background: radial-gradient(120% 70% at 50% -10%, var(--bg-elev), var(--bg) 60%);
        color: var(--text); min-height: 100vh;
      }
      h1 { font-size: 1.5em; font-weight: 600; letter-spacing: -0.01em; color: var(--heading); margin: 0 0 18px; }
      h2 { font-size: 0.95em; font-weight: 600; color: var(--heading); margin: 0 0 8px; }
      label {
        display: block; margin-bottom: 7px; font-size: 11px; font-weight: 600;
        text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted);
      }
      input, select {
        display: block; margin-bottom: 18px; width: 100%; padding: 10px 12px; font-size: 14px;
        color: var(--text); background: var(--surface-2);
        border: 1px solid var(--border); border-radius: 10px;
        transition: border-color 0.16s var(--ease-out), box-shadow 0.16s var(--ease-out);
      }
      input::placeholder { color: var(--muted); }
      input:focus, select:focus {
        outline: none; border-color: var(--accent);
        box-shadow: 0 0 0 3px oklch(from var(--accent) l c h / 0.18);
      }
      button {
        display: block; width: 100%; padding: 11px; font-size: 14px; font-weight: 600;
        border: none; border-radius: 10px; background: var(--accent); color: var(--accent-ink); cursor: pointer;
        transition: filter 0.16s var(--ease-out), transform 0.12s var(--ease-out);
      }
      button:hover { filter: brightness(1.06); }
      button:active { transform: scale(0.98); }
      #chooseButton {
        background: var(--surface); color: var(--text); border: 1px solid var(--border); margin-bottom: 8px;
      }
      #chooseButton:hover { filter: none; border-color: oklch(from var(--accent) l c h / 0.55); }
      .instructions {
        font-size: 13px; line-height: 1.55; color: var(--text);
        margin-bottom: 22px; padding: 14px 16px;
        background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      }
      .instructions p { margin: 8px 0; color: var(--muted); }
      .instructions pre {
        margin: 10px 0 4px; background: var(--surface-2); color: var(--text);
        padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border);
        overflow-x: auto; font-size: 12px;
      }
      #fileName { font-size: 13px; color: var(--muted); margin: 0 0 18px; word-break: break-all; }
      @media (prefers-reduced-motion: reduce) { button:active { transform: none; } }
    </style>
  </head>
  <body>
    <h1>Import Dictionary</h1>
    <div class="instructions">
      <h2>Instructions</h2>
      <p>Your custom dictionary file should be a plain text file in this format:</p>
      <pre>word1 - translation1
word2 - translation2
...</pre>
      <p>Each line is a word and its translation separated by " - ". Empty or malformed lines are skipped.</p>
    </div>
    <label for="dictionaryName">Dictionary Name</label>
    <input type="text" id="dictionaryName" placeholder="Enter dictionary name" required>
    <label for="language">Language</label>
    <select id="language">
      <option value="en">English</option>
      <option value="de">German</option>
      <option value="fr">French</option>
    </select>
    <label for="fromLanguage">From Language</label>
    <select id="fromLanguage">
      <option value="en">English</option>
      <option value="de">German</option>
      <option value="fr">French</option>
      <option value="ru">Russian</option>
    </select>
    <label>Dictionary File</label>
    <button id="chooseButton" type="button">Choose .txt file…</button>
    <p id="fileName">No file selected</p>
    <button id="importButton">Import</button>
    <script>
      let selectedFilePath = null;

      document.getElementById('chooseButton').addEventListener('click', async () => {
        const filePath = await window.vocab.chooseFile();
        if (filePath) {
          selectedFilePath = filePath;
          document.getElementById('fileName').textContent = filePath;
        }
      });

      document.getElementById('importButton').addEventListener('click', async () => {
        const dictionaryName = document.getElementById('dictionaryName').value.trim();
        const language = document.getElementById('language').value;
        const fromLanguage = document.getElementById('fromLanguage').value;

        if (!dictionaryName || !selectedFilePath) {
          alert('Please enter a name and choose a file.');
          return;
        }

        const result = await window.vocab.importDictionary({
          filePath: selectedFilePath,
          dictionaryName,
          language,
          fromLanguage
        });

        if (result.success) {
          alert(`Dictionary ${result.dictionaryName} imported successfully.`);
        } else {
          alert(`Failed to import dictionary: ${result.error}`);
        }
      });
    </script>
  </body>
</html>
