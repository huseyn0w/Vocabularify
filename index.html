<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Vocabularify</title>
    <style>
      /* ============================================================
         Obsidian / Alabaster design system — see DESIGN.md
         ============================================================ */
      :root {
        /* Alabaster (light) */
        --bg: oklch(0.975 0.003 264);
        --bg-elev: oklch(0.99 0.002 264);
        --ink: oklch(0.20 0.014 264);
        --muted: oklch(0.50 0.012 264);
        --accent: oklch(0.55 0.10 70);
        --bar-bg: oklch(0 0 0 / 0.09);
        --hairline: oklch(0 0 0 / 0.07);
        --glow: oklch(0.55 0.10 70 / 0.08);
        --target-glow: transparent;

        --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
      }
      body.dark {
        /* Obsidian (dark, default) */
        --bg: oklch(0.18 0.012 264);
        --bg-elev: oklch(0.235 0.014 264);
        --ink: oklch(0.965 0.014 90);
        --muted: oklch(0.70 0.012 264);
        --accent: oklch(0.80 0.085 82);
        --bar-bg: oklch(1 0 0 / 0.10);
        --hairline: oklch(1 0 0 / 0.09);
        --glow: oklch(0.80 0.085 82 / 0.18);
        --target-glow: oklch(0.80 0.085 82 / 0.18);
      }

      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }

      body {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        padding: 26px 30px;
        /* Soft top vignette: light pools at the top, settles into the field. */
        background:
          radial-gradient(130% 90% at 50% -10%, var(--bg-elev), var(--bg) 62%);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
        user-select: none;
        overflow: hidden;
        transition: background 0.4s var(--ease-out), color 0.4s var(--ease-out);
      }

      /* A single brass glow breathing behind the word — the luxe light source. */
      body::before {
        content: "";
        position: absolute;
        top: 38%;
        left: 50%;
        width: 78%;
        height: 56%;
        transform: translate(-50%, -50%);
        background: radial-gradient(closest-side, var(--glow), transparent 78%);
        filter: blur(6px);
        pointer-events: none;
        z-index: 0;
      }

      #phrase-container {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        text-align: center;
        animation: phrase-in 0.42s var(--ease-out) both;
      }

      #source {
        font-size: clamp(13px, 3vw, 27px);
        font-weight: 500;
        letter-spacing: 0.01em;
        color: var(--muted);
      }

      #target {
        font-size: clamp(23px, 7.6vw, 82px);
        font-weight: 600;
        letter-spacing: -0.02em;
        line-height: 1.1;
        text-wrap: balance;
        color: var(--ink);
        text-shadow: 0 0 28px var(--target-glow);
        /* The Checkup reveal eases the answer into focus (blur → crisp). */
        transition: opacity 0.32s var(--ease-out), filter 0.32s var(--ease-out),
                    transform 0.32s var(--ease-out);
      }
      #target.hidden {
        opacity: 0;
        filter: blur(7px);
        transform: translateY(3px);
      }

      /* The signature focus-pull: every new word resolves out of soft focus. */
      @keyframes phrase-in {
        from { opacity: 0; transform: translateY(8px); filter: blur(6px); }
        to   { opacity: 1; transform: translateY(0);   filter: blur(0); }
      }

      #hint {
        position: relative;
        z-index: 1;
        font-size: clamp(10px, 2.2vw, 14px);
        color: var(--muted);
        opacity: 0;
        transition: opacity 0.3s var(--ease-out);
      }
      body:hover #hint { opacity: 0.9; }
      #hint kbd {
        font-family: inherit;
        font-weight: 600;
        color: var(--ink);
        opacity: 0.85;
        padding: 1px 6px;
        border-radius: 6px;
        border: 1px solid var(--hairline);
        background: oklch(1 0 0 / 0.04);
      }

      .progress {
        position: relative;
        z-index: 1;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }
      #progress-bar {
        width: 100%;
        height: 5px;
        background: var(--bar-bg);
        border-radius: 999px;
        overflow: hidden;
      }
      #progress-bar-inner {
        height: 100%;
        width: 0;
        border-radius: 999px;
        background: var(--accent);
        box-shadow: 0 0 12px var(--target-glow);
        transition: width 0.4s var(--ease-out);
      }
      #progress-label {
        font-size: clamp(10px, 2vw, 14px);
        color: var(--muted);
        font-variant-numeric: tabular-nums;
        letter-spacing: 0.02em;
      }

      @media (prefers-reduced-motion: reduce) {
        #phrase-container { animation: phrase-fade 0.25s ease both; }
        #target, #progress-bar-inner, body { transition: opacity 0.2s ease, color 0.2s ease, background 0.2s ease; }
        #target.hidden { filter: none; transform: none; }
        @keyframes phrase-fade { from { opacity: 0; } to { opacity: 1; } }
      }
    </style>
  </head>
  <body>
    <div id="phrase-container">
      <span id="source"></span>
      <span id="target"></span>
    </div>
    <div id="hint">
      <kbd>Shift</kbd> + <kbd>←</kbd> / <kbd>→</kbd> to navigate
    </div>
    <div class="progress">
      <div id="progress-bar"><div id="progress-bar-inner"></div></div>
      <div id="progress-label"></div>
    </div>
    <script src="out/renderer/main.js"></script>
  </body>
</html>
