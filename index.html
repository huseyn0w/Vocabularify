<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Vocabularify</title>
    <style>
      :root {
        --bg: #ffffff;
        --text: #1d1d1f;
        --muted: #86868b;
        --bar-bg: rgba(0, 0, 0, 0.08);
        --bar-fill: #34c759;
      }
      body.dark {
        --bg: #1c1c1e;
        --text: #f5f5f7;
        --muted: #98989d;
        --bar-bg: rgba(255, 255, 255, 0.14);
        --bar-fill: #34c759;
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        padding: 22px 26px;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        user-select: none;
        overflow: hidden;
        transition: background 0.3s ease, color 0.3s ease;
      }

      #phrase-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        text-align: center;
        animation: phrase-in 0.32s ease;
      }
      #source {
        /* Scales with the window width so a larger window means larger text. */
        font-size: clamp(13px, 3vw, 28px);
        font-weight: 500;
        color: var(--muted);
      }
      #target {
        font-size: clamp(22px, 7.5vw, 80px);
        font-weight: 650;
        letter-spacing: -0.01em;
        line-height: 1.15;
        transition: opacity 0.25s ease;
      }
      #target.hidden {
        opacity: 0;
      }

      @keyframes phrase-in {
        from {
          opacity: 0;
          transform: translateY(5px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      #hint {
        font-size: clamp(10px, 2.2vw, 15px);
        color: var(--muted);
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      /* The hint stays out of the way and only appears while hovering. */
      body:hover #hint {
        opacity: 0.85;
      }
      #hint kbd {
        font-family: inherit;
        font-weight: 600;
        color: var(--text);
        opacity: 0.7;
      }

      .progress {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
      }
      #progress-bar {
        width: 100%;
        height: 6px;
        background: var(--bar-bg);
        border-radius: 999px;
        overflow: hidden;
      }
      #progress-bar-inner {
        height: 100%;
        width: 0;
        background: var(--bar-fill);
        border-radius: 999px;
        transition: width 0.3s ease;
      }
      #progress-label {
        font-size: clamp(10px, 2vw, 15px);
        color: var(--muted);
        font-variant-numeric: tabular-nums;
      }
    </style>
  </head>
  <body>
    <div id="phrase-container">
      <span id="source"></span>
      <span id="target"></span>
    </div>
    <div id="hint">
      <kbd>Shift</kbd> + <kbd>←</kbd> / <kbd>→</kbd> to navigate
    </div>
    <div class="progress">
      <div id="progress-bar"><div id="progress-bar-inner"></div></div>
      <div id="progress-label"></div>
    </div>
    <script src="src/renderer/main.js"></script>
  </body>
</html>
