<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>About Vocabularify</title>
  <style>
    /* Obsidian premium — see DESIGN.md */
    :root {
      --bg: oklch(0.18 0.012 264);
      --bg-elev: oklch(0.235 0.014 264);
      --surface: oklch(0.235 0.013 264);
      --heading: oklch(0.965 0.012 90);
      --text: oklch(0.84 0.008 264);
      --muted: oklch(0.62 0.012 264);
      --accent: oklch(0.80 0.085 82);
      --border: oklch(1 0 0 / 0.10);
      --glow: oklch(0.80 0.085 82 / 0.16);
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      position: relative;
      margin: 0; padding: 38px 34px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      background: radial-gradient(130% 80% at 50% -10%, var(--bg-elev), var(--bg) 62%);
      color: var(--text);
      overflow: hidden;
    }
    body::before {
      content: ""; position: absolute; top: 26%; left: 50%; width: 70%; height: 44%;
      transform: translate(-50%, -50%);
      background: radial-gradient(closest-side, var(--glow), transparent 78%);
      filter: blur(8px); pointer-events: none; z-index: 0;
    }
    .stack { position: relative; z-index: 1; max-width: 420px; }
    h1 {
      margin: 0 0 4px; font-size: 1.9em; font-weight: 600; letter-spacing: -0.02em;
      color: var(--heading);
    }
    .version {
      display: inline-block; margin-bottom: 16px; font-size: 12px; font-weight: 600;
      letter-spacing: 0.06em; color: var(--accent);
      padding: 3px 10px; border: 1px solid var(--border); border-radius: 999px;
    }
    p.lead { font-size: 0.95em; line-height: 1.6; margin: 0 0 24px; color: var(--text); }
    .links { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin-top: 4px; }
    a {
      display: inline-flex; align-items: center; gap: 7px;
      color: var(--text); text-decoration: none; font-size: 13px; font-weight: 500;
      padding: 9px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 11px;
      transition: border-color 0.16s var(--ease-out), transform 0.12s var(--ease-out), color 0.16s var(--ease-out);
    }
    a:hover { border-color: oklch(from var(--accent) l c h / 0.6); color: var(--heading); transform: translateY(-1px); }
    a:active { transform: translateY(0) scale(0.97); }
    a:focus-visible { outline: none; box-shadow: 0 0 0 3px oklch(from var(--accent) l c h / 0.2), 0 0 0 1px var(--accent); }
    footer { position: relative; z-index: 1; margin-top: 26px; font-size: 0.8em; color: var(--muted); }
    @media (prefers-reduced-motion: reduce) { a:hover { transform: none; } }
  </style>
</head>
<body>
  <div class="stack">
    <h1>Vocabularify</h1>
    <span class="version">VERSION 1.1.1</span>
    <p class="lead">
      A desktop companion that surfaces a new word and its translation every few seconds,
      so your vocabulary grows quietly in the background while you work.
    </p>
    <div class="links">
      <a href="https://github.com/huseyn0w/Vocabularify" target="_blank">🚀 GitHub Project</a>
      <a href="https://helloelman.com" target="_blank">👨‍💻 About the Author</a>
      <a href="https://www.paypal.com/donate/?hosted_button_id=MMANJ7TC2SJMN" target="_blank">💖 Donate</a>
    </div>
  </div>
  <footer>
    Created by Elman Huseynov · <span id="current-year"></span>. All rights reserved.
  </footer>
  <script>
    document.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', (event) => {
        event.preventDefault();
        window.vocab.openExternal(link.href);
      });
    });
    document.getElementById('current-year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
