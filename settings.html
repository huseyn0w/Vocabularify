<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Language</title>
    <style>
      :root {
        --bg: #f5f5f7;
        --card: #ffffff;
        --text: #1d1d1f;
        --muted: #86868b;
        --accent: #1f6feb;
        --border: #e3e3e8;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1c1c1e;
          --card: #2c2c2e;
          --text: #f5f5f7;
          --muted: #9b9ba0;
          --accent: #6aa6ff;
          --border: #3a3a3c;
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 22px 24px 26px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      h1 { font-size: 1.3em; margin: 0 0 2px; }
      p.sub { margin: 0 0 18px; font-size: 13px; color: var(--muted); }
      .section-label {
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--muted);
        margin: 18px 0 10px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 10px;
      }
      .lang {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 11px 12px;
        border: 1.5px solid var(--border);
        border-radius: 12px;
        background: var(--card);
        cursor: pointer;
        font-size: 14px;
        transition: border-color 0.15s ease, transform 0.06s ease, opacity 0.15s ease;
        user-select: none;
      }
      .lang .flag { font-size: 22px; line-height: 1; }
      .lang:hover { border-color: var(--accent); }
      .lang:active { transform: scale(0.98); }
      .lang.selected {
        border-color: var(--accent);
        box-shadow: inset 0 0 0 1px var(--accent);
      }
      .lang.disabled {
        opacity: 0.32;
        pointer-events: none;
      }
      .summary {
        margin-top: 22px;
        font-size: 14px;
        color: var(--muted);
        text-align: center;
      }
      .summary b { color: var(--text); }
    </style>
  </head>
  <body>
    <h1>Language</h1>
    <p class="sub">Choose the language you want to learn and the one to translate from.</p>

    <div class="section-label">I want to learn</div>
    <div class="grid" id="learn-grid"></div>

    <div class="section-label">From</div>
    <div class="grid" id="from-grid"></div>

    <div class="summary" id="summary"></div>

    <script src="src/renderer/settings.js"></script>
  </body>
</html>
