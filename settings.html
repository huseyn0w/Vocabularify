<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Settings</title>
    <style>
      :root {
        --bg: #f5f5f7; --card: #ffffff; --text: #1d1d1f; --muted: #86868b;
        --accent: #1f6feb; --border: #e3e3e8; --chip: #ececf1;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1c1c1e; --card: #2c2c2e; --text: #f5f5f7; --muted: #9b9ba0;
          --accent: #6aa6ff; --border: #3a3a3c; --chip: #3a3a3c;
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; padding: 22px 24px 28px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: var(--bg); color: var(--text); font-size: 14px;
      }
      h1 { font-size: 1.35em; margin: 0 0 18px; }
      .section { margin-bottom: 22px; }
      .section-label {
        font-size: 12px; font-weight: 600; text-transform: uppercase;
        letter-spacing: 0.04em; color: var(--muted); margin: 0 0 10px;
      }
      .grid {
        display: grid; grid-template-columns: repeat(auto-fill, minmax(116px, 1fr)); gap: 9px;
      }
      .lang, .chip {
        display: flex; align-items: center; gap: 9px; padding: 10px 12px;
        border: 1.5px solid var(--border); border-radius: 11px; background: var(--card);
        cursor: pointer; transition: border-color 0.15s, opacity 0.15s, transform 0.06s;
        user-select: none;
      }
      .lang .flag { font-size: 21px; line-height: 1; }
      .lang:hover, .chip:hover { border-color: var(--accent); }
      .lang:active, .chip:active { transform: scale(0.98); }
      .lang.selected, .chip.selected { border-color: var(--accent); box-shadow: inset 0 0 0 1px var(--accent); }
      .lang.disabled { opacity: 0.3; pointer-events: none; }

      .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
      .chip { justify-content: center; padding: 8px 14px; min-width: 56px; }

      .toggle { display: inline-flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; }
      .switch { width: 42px; height: 25px; border-radius: 999px; background: var(--chip); position: relative; transition: background 0.2s; }
      .switch::after { content: ""; position: absolute; top: 3px; left: 3px; width: 19px; height: 19px; border-radius: 50%; background: #fff; transition: transform 0.2s; box-shadow: 0 1px 2px rgba(0,0,0,0.3); }
      .toggle.on .switch { background: #34c759; }
      .toggle.on .switch::after { transform: translateX(17px); }

      input[type="number"] {
        width: 76px; padding: 8px 9px; font-size: 14px; border: 1.5px solid var(--border);
        border-radius: 9px; background: var(--card); color: var(--text);
      }
      button.action {
        padding: 9px 16px; font-size: 14px; font-weight: 600; border: none; border-radius: 9px;
        background: var(--accent); color: #fff; cursor: pointer;
      }
      button.action:hover { filter: brightness(1.07); }
      .summary { font-size: 13px; color: var(--muted); margin-top: 4px; }
      .summary b { color: var(--text); }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <h1>Settings</h1>

    <div class="section">
      <div class="section-label">I want to learn</div>
      <div class="grid" id="learn-grid"></div>
    </div>
    <div class="section">
      <div class="section-label">Translate from</div>
      <div class="grid" id="from-grid"></div>
      <div class="summary" id="lang-summary"></div>
    </div>

    <div class="section">
      <div class="section-label">Level</div>
      <div class="row" id="level-row"></div>
    </div>

    <div class="section">
      <div class="section-label">Background</div>
      <div class="row" id="bg-row"></div>
    </div>

    <div class="section hidden" id="mode-section">
      <div class="section-label">Mode</div>
      <div class="row" id="mode-row"></div>
    </div>

    <div class="section">
      <div class="section-label">Sound</div>
      <div class="toggle" id="sound-toggle"><span class="switch"></span><span>Pronounce words</span></div>
    </div>

    <div class="section">
      <div class="section-label">Changing speed</div>
      <div class="row" id="speed-row"></div>
      <div class="row" style="margin-top: 8px;">
        <span style="color: var(--muted);">Custom:</span>
        <input type="number" id="speed-custom" min="1" max="600" step="1" />
        <span style="color: var(--muted);">seconds</span>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Dictionaries</div>
      <button class="action" id="import-btn">Import dictionary…</button>
    </div>

    <script src="src/renderer/settings.js"></script>
  </body>
</html>
